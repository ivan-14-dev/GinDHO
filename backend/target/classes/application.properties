server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gindho
spring.datasource.username=mon_user1
spring.datasource.password=mon_mot_de_passe
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Storage
file.upload-dir=uploads
file.max-size=10MB

# Logging
logging.level.root=INFO
logging.level.com.gindho=DEBUG
logging.file.name=logs/gindho.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %clr(%-5level) - %msg%n

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Async Configuration
task.execution.pool.size=10
spring.task.execution.pool.max-size=20
spring.task.execution.thread-name-prefix=gindho-async-
